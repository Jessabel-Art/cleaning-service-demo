name: Build & publish deploy branch

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # All VITE_* used during build go here
    env:
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}

      # Your app-specific vars (add these in repo Settings → Secrets and variables → Actions → Variables)
      VITE_RECAPTCHA_SITE_KEY: ${{ vars.VITE_RECAPTCHA_SITE_KEY }}
      VITE_OWNER_UID: ${{ vars.VITE_OWNER_UID }}
      VITE_SLOT_CAPACITY: ${{ vars.VITE_SLOT_CAPACITY }}
      VITE_DAILY_CAPACITY: ${{ vars.VITE_DAILY_CAPACITY }}
      VITE_OWNER_EMAIL: ${{ vars.VITE_OWNER_EMAIL }}
      VITE_BRAND_NAME: ${{ vars.VITE_BRAND_NAME }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Push dist to deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: deploy       # output branch
          folder: dist         # built files
          clean: true
