name: Build & Publish to deploy
on:
  push:
    branches: [ main ]   # build whenever main changes
permissions:
  contents: write        # allow pushing to the repo
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      # SPA niceties for Hostinger/Apache
      - name: Prepare SPA artifacts
        run: |
          cp dist/index.html dist/404.html
          cat > dist/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      # Publish only the contents of dist/ to the deploy branch
      - name: Publish dist to deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin
          # create an orphan commit for deploy and force-push dist/
          git checkout --orphan deploy
          git --work-tree=dist add --all
          git --work-tree=dist commit -m "Deploy ${GITHUB_SHA::7}"
          git push -f origin HEAD:deploy
